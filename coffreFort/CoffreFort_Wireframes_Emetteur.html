.frame{border-radius:12px;overflow:hidden;border:1px solid #CBD5E1;background:#F8FAFC;}

.topbar.admin{background:#3B1F6E;}
.logo{color:#fff;font-size:14px;font-weight:600;}
.tag{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:500;}
.layout{display:flex;height:520px;}
.sidebar{width:170px;background:#fff;border-right:1px solid #E2E8F0;padding:10px 0;flex-shrink:0;}
.si{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;color:#64748B;border-left:3px solid transparent;cursor:pointer;}

.ct{font-size:10px;font-weight:600;color:#94A3B8;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat{border-radius:8px;padding:12px;}
.inp{border:1px solid #CBD5E1;border-radius:6px;padding:7px 10px;font-size:12px;background:#fff;width:100%;margin-bottom:8px;color:#334155;}
.lbl{font-size:10px;color:#64748B;display:block;margin-bottom:3px;}
.bdg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;display:inline-block;}
.bg{background:#DCFCE7;color:#15803D;}
.bb{background:#DBEAFE;color:#1D4ED8;}
.ba{background:#FEF3C7;color:#92400E;}
.br{background:#FEE2E2;color:#991B1B;}
.bgr{background:#F1F5F9;color:#475569;}
.bp{background:#EDE9F7;color:#5B21B6;}
.btn-p{background:#185FA5;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-o{color:#185FA5;border:1px solid #185FA5;background:transparent;border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-pu{background:#6B3FA0;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-gr{background:#15803D;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-rd{background:#DC2626;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;}
.btn-gl{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1;border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer;}
.dr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F1F5F9;}
.dr:last-child{border-bottom:none;}
.ub{border:2px dashed #CBD5E1;border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;background:#F8FAFC;}
.ub.ok{border-color:#16A34A;background:#F0FDF4;}
.ib{border-radius:7px;padding:9px 11px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;}
.pb{height:5px;background:#E2E8F0;border-radius:3px;}
.pf{height:100%;border-radius:3px;background:#185FA5;}
.tr{display:grid;align-items:center;padding:8px 10px;border-bottom:1px solid #F1F5F9;gap:6px;}
.tr:last-child{border-bottom:none;}
.th{background:#F8FAFC;font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;border-radius:8px 8px 0 0;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.section-lbl{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin:12px 0 6px;}
.navbtns{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}

</head>
<body>

function renderInd(ac){
  const el=document.getElementById('step-bar');
  if(isAdm){el.innerHTML='';return;}
  let h='<div style="display:flex;align-items:center;background:#fff;padding:12px 16px;border-radius:10px;border:1px solid #E2E8F0;margin-bottom:14px;">';
  STEPS.forEach((s,i)=>{
    const dn=i<ac,at=i===ac;
    h+=`<div class="sdot"><div class="sc ${dn?'done':at?'act':''}">${dn?'<i class="ti ti-check" style="font-size:10px;"></i>':i+1}</div><div class="sl ${dn?'done':at?'act':''}">${s}</div></div>`;
    if(i<STEPS.length-1)h+=`<div class="sline ${dn?'done':''}"></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}

function go(idx,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  isAdm=idx>=4;cur=idx;
  document.getElementById('frame').innerHTML=SS[idx]();
  if(isAdm){
    document.getElementById('step-bar').innerHTML='';
    document.getElementById('steplbl').textContent='';
    document.getElementById('pb').style.display='none';
    document.getElementById('nb').style.display='none';
  } else {
    document.getElementById('pb').style.display='';
    document.getElementById('nb').style.display='';
    renderInd(idx);
    document.getElementById('steplbl').textContent=`Étape ${idx+1} sur 4`;
    document.getElementById('pb').style.opacity=idx===0?'0.3':'1';
    document.getElementById('pb').disabled=idx===0;
    document.getElementById('nb').innerHTML=idx===3?'<i class="ti ti-check"></i> Terminer':'Suivant <i class="ti ti-arrow-right"></i>';
  }
}

function next(){if(!isAdm&&cur<3){cur++;document.querySelectorAll('.tab')[cur].click();}}
function prev(){if(!isAdm&&cur>0){cur--;document.querySelectorAll('.tab')[cur].click();}}

go(0,document.querySelector('.tab'));
</script>
